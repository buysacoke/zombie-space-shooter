<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zombie Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; touch-action: none; user-select: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); generateStars(); });

// ── Stars ────────────────────────────────────────────────────────────────────
let stars = [];
function generateStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.2,
      a: Math.random() * 0.6 + 0.25,
    });
  }
}
generateStars();

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
    e.preventDefault();
  }
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
let touchFiring = false;
const joystick = { active: false, touchId: null, baseX: 0, baseY: 0, dx: 0, dy: 0 };

function fireBtnPos() {
  return { x: canvas.width - 100, y: canvas.height - 100 };
}

function joystickBase() {
  return { x: JOY_X, y: canvas.height - JOY_Y_OFFSET };
}

function handleTouches(e) {
  if (gameState === 'title' || gameState === 'gameover' || gameState === 'shipDying') {
    if (e.type === 'touchstart') { keys['Space'] = true; setTimeout(() => { keys['Space'] = false; }, 100); }
    return;
  }
  const btn = fireBtnPos();
  const jb  = joystickBase();

  touchFiring = false;
  let joystickTouchStillPresent = false;

  for (const t of e.touches) {
    const dist = Math.hypot(t.clientX - btn.x, t.clientY - btn.y);
    if (dist < FIRE_BTN_R) {
      touchFiring = true;
      continue;
    }
    if (!joystick.active && e.type === 'touchstart' && t.clientX < canvas.width * 0.5) {
      joystick.active  = true;
      joystick.touchId = t.identifier;
      joystick.baseX   = jb.x;
      joystick.baseY   = jb.y;
      joystick.dx = joystick.dy = 0;
    }
    if (joystick.active && t.identifier === joystick.touchId) {
      joystickTouchStillPresent = true;
      const rawDx = t.clientX - joystick.baseX;
      const rawDy = t.clientY - joystick.baseY;
      const mag   = Math.hypot(rawDx, rawDy);
      if (mag > JOY_OUTER_R) {
        joystick.dx = (rawDx / mag) * JOY_OUTER_R;
        joystick.dy = (rawDy / mag) * JOY_OUTER_R;
      } else {
        joystick.dx = rawDx;
        joystick.dy = rawDy;
      }
    }
  }

  if (joystick.active && !joystickTouchStillPresent) {
    joystick.active = false; joystick.touchId = null;
    joystick.dx = joystick.dy = 0;
  }
  if (e.touches.length === 0) {
    joystick.active = false; joystick.touchId = null;
    joystick.dx = joystick.dy = 0;
    touchFiring = false;
  }
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTouches(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); handleTouches(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); handleTouches(e); }, { passive: false });

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx     = null;
let musicNodes   = null;
let currentMusic = 'none';
let activeGroans = 0;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playLaser() {
  if (!audioCtx) return;
  const t   = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t);
  osc.frequency.exponentialRampToValueAtTime(200, t + 0.12);
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.15);
}

function playGroan(isBoss) {
  if (!audioCtx) return;
  if (!isBoss && activeGroans >= 3) return;
  activeGroans++;

  const t        = audioCtx.currentTime;
  const baseFreq = isBoss ? 42 : 65 + Math.random() * 30;
  const vol      = isBoss ? 0.13 : 0.055;
  const dur      = isBoss ? 0.65 : 0.42;

  const osc    = audioCtx.createOscillator();
  const shaper = audioCtx.createWaveShaper();
  const g      = audioCtx.createGain();

  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (Math.PI + 150) * x / (Math.PI + 150 * Math.abs(x));
  }
  shaper.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.65, t + dur);

  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.06);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.linearRampToValueAtTime(0.001, t + dur);

  osc.connect(shaper);
  shaper.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.05);
  osc.onended = () => { activeGroans = Math.max(0, activeGroans - 1); };
}

function playExplosion() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [55, 82, 110].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq * (1 + i * 0.03), t);
    osc.frequency.exponentialRampToValueAtTime(20, t + 0.5);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.6);
  });
}

function playZombieDeath() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.18);
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.25);
}

function stopMusic() {
  if (!musicNodes || !audioCtx) return;
  const t = audioCtx.currentTime;
  musicNodes.masterGain.gain.setValueAtTime(musicNodes.masterGain.gain.value, t);
  musicNodes.masterGain.gain.linearRampToValueAtTime(0, t + 0.6);
  const nodes = musicNodes.oscillators;
  setTimeout(() => {
    nodes.forEach(n => { try { n.stop(); n.disconnect(); } catch(e) {} });
  }, 700);
  musicNodes   = null;
  currentMusic = 'none';
}

function startMusic(type) {
  if (currentMusic === type) return;
  stopMusic();
  if (!audioCtx) return;
  currentMusic = type;

  const masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);
  const oscillators = [];

  if (type === 'normal') {
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.055, audioCtx.currentTime + 0.5);

    const melOsc  = audioCtx.createOscillator();
    const melGain = audioCtx.createGain();
    melOsc.type = 'square';
    melGain.gain.setValueAtTime(0, audioCtx.currentTime);
    melOsc.connect(melGain);
    melGain.connect(masterGain);
    melOsc.start();
    oscillators.push(melOsc);

    const bassOsc  = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    bassOsc.type = 'square';
    bassOsc.frequency.value = 98;
    bassGain.gain.value = 0.22;
    bassOsc.connect(bassGain);
    bassGain.connect(masterGain);
    bassOsc.start();
    oscillators.push(bassOsc);

    const MEL = [392, 523, 392, 349, 466, 392, 311, 392,
                 349, 466, 349, 294, 440, 349, 294, 349];
    const noteLen = 0.12, gap = 0.03;
    const loopLen = MEL.length * (noteLen + gap);
    const t0 = audioCtx.currentTime;
    const cycles = Math.ceil(300 / loopLen);
    for (let c = 0; c < cycles; c++) {
      MEL.forEach((freq, i) => {
        const ns = t0 + c * loopLen + i * (noteLen + gap);
        melOsc.frequency.setValueAtTime(freq, ns);
        melGain.gain.setValueAtTime(0.75, ns);
        melGain.gain.setValueAtTime(0, ns + noteLen);
      });
    }

  } else if (type === 'boss') {
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.4);

    const shaper = audioCtx.createWaveShaper();
    const nc = 256, cv = new Float32Array(nc);
    for (let i = 0; i < nc; i++) { const x = (i * 2) / nc - 1; cv[i] = Math.tanh(2 * x); }
    shaper.curve = cv;
    shaper.connect(masterGain);

    const melOsc  = audioCtx.createOscillator();
    const melGain = audioCtx.createGain();
    melOsc.type = 'square';
    melGain.gain.setValueAtTime(0, audioCtx.currentTime);
    melOsc.connect(melGain); melGain.connect(shaper);
    melOsc.start(); oscillators.push(melOsc);

    const bassOsc  = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    bassOsc.type = 'square';
    bassOsc.frequency.value = 41;
    bassGain.gain.value = 0.30;
    bassOsc.connect(bassGain); bassGain.connect(shaper);
    bassOsc.start(); oscillators.push(bassOsc);

    // A-minor pentatonic descending — dark ominous melody
    const BOSS_MEL = [220, 196, 165, 147, 110, 147, 165, 196,
                      220, 247, 220, 196, 165, 147, 110, 98];
    const noteLen = 0.18, gap = 0.05;
    const loopLen = BOSS_MEL.length * (noteLen + gap);
    const t0 = audioCtx.currentTime;
    const cycles = Math.ceil(300 / loopLen);
    for (let c = 0; c < cycles; c++) {
      BOSS_MEL.forEach((freq, i) => {
        const ns = t0 + c * loopLen + i * (noteLen + gap);
        melOsc.frequency.setValueAtTime(freq, ns);
        melGain.gain.setValueAtTime(0.70, ns);
        melGain.gain.setValueAtTime(0, ns + noteLen);
      });
    }
  }

  musicNodes = { masterGain, oscillators };
}

// ── Particles ─────────────────────────────────────────────────────────────────
const particles = [];

function spawnExplosion(x, y) {
  particles.push({ type: 'ring', x, y, r: 0, maxR: 55, life: 0.7, maxLife: 0.7 });
  for (let i = 0; i < 10; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 120;
    particles.push({ type: 'debris', x, y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      r: 3 + Math.random() * 4, life: 0.5 + Math.random() * 0.4,
      maxLife: 0.9, color: Math.random() < 0.5 ? '#00ff88' : '#ffffff' });
  }
}

function spawnZombieDeath(x, y, hue) {
  for (let i = 0; i < 8; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 80;
    particles.push({ type: 'debris', x, y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      r: 2 + Math.random() * 3, life: 0.4 + Math.random() * 0.2,
      maxLife: 0.6, color: `hsl(${hue},60%,45%)` });
  }
  particles.push({ type: 'ring', x, y, r: 0, maxR: 28, life: 0.35, maxLife: 0.35 });
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    if (p.type === 'debris') { p.x += p.vx * dt; p.y += p.vy * dt; }
    if (p.type === 'ring')   { p.r = p.maxR * (1 - p.life / p.maxLife); }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    if (p.type === 'debris') {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'ring') {
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = '#00ffaa';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

// ── Constants ─────────────────────────────────────────────────────────────────
const SHIP_SPEED     = 288;
const SHIP_W         = 22;
const SHIP_H         = 36;
const SHIP_HIT_R     = 14;

const LASER_SPEED    = 760;
const LASER_W        = 3;
const LASER_H        = 20;
const LASER_GAP      = 10;
const FIRE_RATE      = 0.15;

const ZOMBIE_R       = 20;
const Z_SPEED_NORM   = 55;
const Z_SPEED_AGGRO  = 175;
const Z_AGGRO_DIST   = 188;

const BOSS_BASE_HP     = 10;
const BOSS_BASE_SPEED  = 42;
const BOSS_SPEED_SCALE = 18;
const BOSS_BASE_R      = 65;
const BOSS_MAX_R       = 80;

const WAVE_INTRO_DUR = 2.2;
const FIRE_BTN_R     = 72;

const LIVES            = 3;
const BOSS_LASER_SPEED = 260;
const BOSS_LASER_COLOR = '#ff6600';
const JOY_OUTER_R      = 65;
const JOY_INNER_R      = 28;
const JOY_X            = 100;
const JOY_Y_OFFSET     = 110;

// ── Game state ────────────────────────────────────────────────────────────────
// States: 'title' | 'waveIntro' | 'playing' | 'shipDying' | 'gameover'
let gameState = 'title';
let score     = 0;
let wave      = 1;
let stateTimer   = 0;
let lastFireTime = -999;
let deathTimer   = 0;
let killerZombieIdx = -1;

let ship    = { x: 0, y: 0, lives: LIVES, bank: 0 };
let lasers  = [];
let zombies = [];
const bossLasers = [];

let boss           = null;
let bossesDefeated = 0;
let shipSpeedMult  = 1.0;

// ── Init / Reset ──────────────────────────────────────────────────────────────
function resetShipPos() {
  ship.x = canvas.width  / 2;
  ship.y = canvas.height * 0.75;
}

function initGame() {
  ensureAudio();
  stopMusic();
  score          = 0;
  wave           = 1;
  lastFireTime   = -999;
  bossesDefeated = 0;
  shipSpeedMult  = 1.0;
  boss           = null;
  lasers         = [];
  zombies        = [];
  bossLasers.length = 0;
  particles.length  = 0;
  ship.lives      = LIVES;
  ship.bank       = 0;
  killerZombieIdx = -1;
  resetShipPos();
  beginWaveIntro();
}

function beginWaveIntro() {
  lasers    = [];
  zombies   = [];
  boss      = null;
  bossLasers.length = 0;
  stateTimer = WAVE_INTRO_DUR;
  gameState  = 'waveIntro';
  killerZombieIdx = -1;
  resetShipPos();
}

function isBossWave(w) { return w % 6 === 0; }
function bossNumber(w) { return w / 6; }

function calcRespawnTime(count) {
  return Math.max(4, 10 + Math.floor((count - 3) / 2));
}

function spawnBoss() {
  const bn = bossNumber(wave);
  boss = {
    x:             canvas.width / 2,
    y:             -BOSS_BASE_R - 10,
    alive:         true,
    hp:            BOSS_BASE_HP * bn,
    maxHp:         BOSS_BASE_HP * bn,
    radius:        Math.min(BOSS_MAX_R, BOSS_BASE_R + (bn - 1) * 5),
    speed:         BOSS_BASE_SPEED + (bn - 1) * BOSS_SPEED_SCALE,
    seed:          Math.random(),
    hue:           0,
    groanTimer:    2 + Math.random() * 3,
    laserTimer:    3 - (bn - 1) * 0.3,
    laserInterval: Math.max(0.8, 3 - (bn - 1) * 0.3),
  };
}

function spawnWave() {
  if (isBossWave(wave)) {
    spawnBoss();
    startMusic('boss');
  } else {
    const count = 3 + (wave - 1) * 2;
    for (let i = 0; i < count; i++) zombies.push(makeZombie());
    startMusic('normal');
  }
}

function makeZombie() {
  const W = canvas.width, H = canvas.height;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if      (edge === 0) { x = Math.random() * W; y = -ZOMBIE_R - 5; }
  else if (edge === 1) { x = Math.random() * W; y = H + ZOMBIE_R + 5; }
  else if (edge === 2) { x = -ZOMBIE_R - 5;     y = Math.random() * H; }
  else                 { x = W + ZOMBIE_R + 5;  y = Math.random() * H; }
  return {
    x, y,
    alive: true,
    respawnTimer: 0,
    seed: Math.random(),
    hue: 90 + Math.random() * 50,
    groanTimer: 2 + Math.random() * 5,
  };
}

// ── Ship death ────────────────────────────────────────────────────────────────
function killShip(zombieIdx) {
  if (gameState !== 'playing') return;
  ensureAudio();
  playExplosion();
  spawnExplosion(ship.x, ship.y);
  killerZombieIdx = zombieIdx;
  ship.lives--;
  gameState  = 'shipDying';
  deathTimer = 3.0;
  stopMusic();
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameState === 'title' || gameState === 'gameover') {
    if (keys['Space']) {
      keys['Space'] = false;
      initGame();
    }
    return;
  }

  if (gameState === 'shipDying') {
    deathTimer -= dt;
    updateParticles(dt);
    if (deathTimer <= 0) {
      if (ship.lives > 0) {
        ship.x = canvas.width / 2;
        ship.y = canvas.height * 0.75;
        ship.bank = 0;
        killerZombieIdx = -1;
        gameState = 'playing';
        startMusic(isBossWave(wave) ? 'boss' : 'normal');
      } else {
        gameState = 'gameover';
      }
    }
    return;
  }

  if (gameState === 'waveIntro') {
    stateTimer -= dt;
    if (stateTimer <= 0) {
      spawnWave();
      gameState = 'playing';
    }
    return;
  }

  // Playing
  updateShip(dt);
  updateLasers(dt);
  updateZombies(dt);
  updateBoss(dt);
  updateBossLasers(dt);
  updateParticles(dt);
  tryFire();
  resolveCollisions();
}

function updateShip(dt) {
  const spd = SHIP_SPEED * shipSpeedMult;
  if (keys['ArrowLeft'])  ship.x -= spd * dt;
  if (keys['ArrowRight']) ship.x += spd * dt;
  if (keys['ArrowUp'])    ship.y -= spd * dt;
  if (keys['ArrowDown'])  ship.y += spd * dt;

  // Joystick movement
  if (joystick.active) {
    const mag = Math.hypot(joystick.dx, joystick.dy);
    if (mag > 4) {
      const ratio = Math.min(1, mag / JOY_OUTER_R);
      ship.x += (joystick.dx / mag) * spd * ratio * dt;
      ship.y += (joystick.dy / mag) * spd * ratio * dt;
    }
  }

  // Banking lean
  let targetBank = 0;
  const movingLeft  = keys['ArrowLeft']  || (joystick.active && joystick.dx < -8);
  const movingRight = keys['ArrowRight'] || (joystick.active && joystick.dx >  8);
  if (movingLeft)       targetBank = -0.28;
  else if (movingRight) targetBank =  0.28;
  ship.bank += (targetBank - ship.bank) * Math.min(1, dt * 7);

  // Clamp within screen
  const hw = SHIP_W + 2, hh = SHIP_H / 2 + 2;
  ship.x = Math.max(hw, Math.min(canvas.width  - hw, ship.x));
  ship.y = Math.max(hh, Math.min(canvas.height - hh, ship.y));
}

function tryFire() {
  if (!keys['Space'] && !touchFiring) return;
  const now = performance.now() / 1000;
  if (now - lastFireTime < FIRE_RATE) return;
  lastFireTime = now;
  playLaser();
  const tipY = ship.y - SHIP_H / 2;
  lasers.push({ x: ship.x - LASER_GAP, y: tipY - LASER_H, dead: false });
  lasers.push({ x: ship.x + LASER_GAP, y: tipY - LASER_H, dead: false });
}

function updateLasers(dt) {
  for (const l of lasers) l.y -= LASER_SPEED * dt;
  lasers = lasers.filter(l => !l.dead && l.y + LASER_H > 0);
}

function updateZombies(dt) {
  const W = canvas.width, H = canvas.height;

  for (const z of zombies) {
    if (!z.alive) {
      z.respawnTimer -= dt;
      if (z.respawnTimer <= 0) {
        const fresh = makeZombie();
        z.x = fresh.x;
        z.y = fresh.y;
        z.alive = true;
      }
      continue;
    }

    const distToShip = Math.hypot(ship.x - z.x, ship.y - z.y);
    let spd;
    if (distToShip < Z_AGGRO_DIST) {
      const t = 1 - (distToShip / Z_AGGRO_DIST);
      spd = Z_SPEED_AGGRO * (0.6 + 0.4 * t);
    } else {
      const outerRange = Z_AGGRO_DIST * 4;
      const t = Math.max(0, 1 - distToShip / outerRange);
      spd = Z_SPEED_NORM + (Z_SPEED_AGGRO - Z_SPEED_NORM) * 0.4 * t;
    }

    const dx = ship.x - z.x, dy = ship.y - z.y;
    const d  = Math.hypot(dx, dy);
    if (d > 0.5) {
      z.x += (dx / d) * spd * dt;
      z.y += (dy / d) * spd * dt;
    }

    const buf = ZOMBIE_R + 5;
    if (z.x < -buf)     z.x += W + buf * 2;
    if (z.x > W + buf)  z.x -= W + buf * 2;
    if (z.y < -buf)     z.y += H + buf * 2;
    if (z.y > H + buf)  z.y -= H + buf * 2;

    z.groanTimer -= dt;
    if (z.groanTimer <= 0) {
      playGroan(false);
      z.groanTimer = 3 + Math.random() * 6;
    }
  }
}

function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  const dx = ship.x - boss.x, dy = ship.y - boss.y;
  const d  = Math.hypot(dx, dy);
  if (d > 0.5) {
    boss.x += (dx / d) * boss.speed * dt;
    boss.y += (dy / d) * boss.speed * dt;
  }

  boss.groanTimer -= dt;
  if (boss.groanTimer <= 0) {
    playGroan(true);
    boss.groanTimer = 3 + Math.random() * 4;
  }

  boss.laserTimer -= dt;
  if (boss.laserTimer <= 0) {
    boss.laserTimer = boss.laserInterval;
    const ldx = ship.x - boss.x, ldy = ship.y - boss.y;
    const ld  = Math.hypot(ldx, ldy) || 1;
    bossLasers.push({
      x: boss.x, y: boss.y,
      vx: (ldx / ld) * BOSS_LASER_SPEED,
      vy: (ldy / ld) * BOSS_LASER_SPEED,
      dead: false,
    });
  }
}

function updateBossLasers(dt) {
  const W = canvas.width, H = canvas.height;
  for (const l of bossLasers) {
    if (l.dead) continue;
    l.x += l.vx * dt;
    l.y += l.vy * dt;
    if (l.x < -20 || l.x > W + 20 || l.y < -20 || l.y > H + 20) l.dead = true;
  }
  for (let i = bossLasers.length - 1; i >= 0; i--) {
    if (bossLasers[i].dead) bossLasers.splice(i, 1);
  }
}

function resolveCollisions() {
  // Lasers vs zombies
  for (const l of lasers) {
    if (l.dead) continue;
    const lLeft = l.x - LASER_W / 2, lRight = l.x + LASER_W / 2;
    const lTop  = l.y,               lBot   = l.y + LASER_H;
    for (let zi = 0; zi < zombies.length; zi++) {
      const z = zombies[zi];
      if (!z.alive) continue;
      const nearX = Math.max(lLeft, Math.min(z.x, lRight));
      const nearY = Math.max(lTop,  Math.min(z.y, lBot));
      if ((nearX - z.x) ** 2 + (nearY - z.y) ** 2 < ZOMBIE_R ** 2) {
        z.alive        = false;
        z.respawnTimer = calcRespawnTime(zombies.length);
        score++;
        l.dead = true;
        spawnZombieDeath(z.x, z.y, z.hue);
        playZombieDeath();
        break;
      }
    }
  }

  // Lasers vs boss
  if (boss && boss.alive) {
    for (const l of lasers) {
      if (l.dead) continue;
      const lLeft = l.x - LASER_W / 2, lRight = l.x + LASER_W / 2;
      const lTop  = l.y,               lBot   = l.y + LASER_H;
      const nearX = Math.max(lLeft, Math.min(boss.x, lRight));
      const nearY = Math.max(lTop,  Math.min(boss.y, lBot));
      if ((nearX - boss.x) ** 2 + (nearY - boss.y) ** 2 < boss.radius ** 2) {
        boss.hp--;
        l.dead = true;
        if (boss.hp <= 0) {
          boss.alive = false;
          bossesDefeated++;
          shipSpeedMult += 0.1;
        }
      }
    }
  }

  // Boss lasers vs ship
  for (const l of bossLasers) {
    if (l.dead) continue;
    if (Math.hypot(l.x - ship.x, l.y - ship.y) < SHIP_HIT_R + 3) {
      l.dead = true;
      killShip(-1);
      return;
    }
  }

  // Ship vs zombies
  for (let zi = 0; zi < zombies.length; zi++) {
    const z = zombies[zi];
    if (!z.alive) continue;
    if (Math.hypot(ship.x - z.x, ship.y - z.y) < ZOMBIE_R + SHIP_HIT_R) {
      killShip(zi);
      return;
    }
  }

  // Ship vs boss
  if (boss && boss.alive) {
    if (Math.hypot(ship.x - boss.x, ship.y - boss.y) < boss.radius + SHIP_HIT_R) {
      killShip(-1);
      return;
    }
  }

  // Wave complete
  const allZombiesDead = zombies.length > 0 && !zombies.some(z => z.alive);
  const bossDead       = boss && !boss.alive;
  if (allZombiesDead || bossDead) {
    wave++;
    beginWaveIntro();
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  if (gameState === 'waveIntro') {
    drawWaveIntro();
    return;
  }

  // playing, shipDying, or gameover — render game world
  drawZombies();
  drawBoss();
  drawBossLasers();
  drawLasers();
  if (gameState !== 'shipDying') drawShip();
  drawParticles();
  drawHUD();
  drawBossHealthBar();
  drawFireButton();
  drawJoystick();

  if (gameState === 'gameover') {
    drawGameOver();
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  }
}

function drawShip() {
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.bank);

  const H2 = SHIP_H / 2, W = SHIP_W;

  // Engine glow — always on, brighter when moving
  const moving = keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'] || joystick.active;
  const glowAlpha = moving ? 0.75 : 0.40;
  const glowGrad = ctx.createRadialGradient(0, H2 * 0.6, 0, 0, H2 * 0.6, 18);
  glowGrad.addColorStop(0, `rgba(0,180,255,${glowAlpha})`);
  glowGrad.addColorStop(1, 'rgba(0,80,180,0)');
  ctx.beginPath();
  ctx.arc(0, H2 * 0.6, 18, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // Body gradient
  const bodyGrad = ctx.createLinearGradient(0, -H2, 0, H2);
  bodyGrad.addColorStop(0, '#22ff88');
  bodyGrad.addColorStop(1, '#007740');

  // Main hull with wing notches
  ctx.beginPath();
  ctx.moveTo(0, -H2);
  ctx.lineTo(W, H2);
  ctx.lineTo(W * 0.45, H2 * 0.55);
  ctx.lineTo(0, H2 * 0.75);
  ctx.lineTo(-W * 0.45, H2 * 0.55);
  ctx.lineTo(-W, H2);
  ctx.closePath();
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = '#aaffcc';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Cockpit with lens highlight
  const cockpitGrad = ctx.createRadialGradient(-2, -H2 * 0.3, 1, 0, -H2 * 0.25, 8);
  cockpitGrad.addColorStop(0, 'rgba(220,245,255,0.95)');
  cockpitGrad.addColorStop(1, 'rgba(80,160,220,0.70)');
  ctx.beginPath();
  ctx.ellipse(0, -H2 * 0.25, 7, 9, 0, 0, Math.PI * 2);
  ctx.fillStyle = cockpitGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Wing tip accents
  ctx.fillStyle = '#00ffaa';
  ctx.beginPath(); ctx.arc(-W + 3, H2 - 3, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( W - 3, H2 - 3, 3, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawLasers() {
  ctx.save();
  ctx.shadowColor = '#ff44bb';
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = '#ff66cc';
  for (const l of lasers) {
    if (l.dead) continue;
    ctx.fillRect(l.x - LASER_W / 2, l.y, LASER_W, LASER_H);
  }
  ctx.restore();
}

function drawBossLasers() {
  ctx.save();
  ctx.shadowColor = BOSS_LASER_COLOR;
  ctx.shadowBlur  = 10;
  ctx.fillStyle   = BOSS_LASER_COLOR;
  for (const l of bossLasers) {
    if (l.dead) continue;
    const ang = Math.atan2(l.vy, l.vx);
    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(ang + Math.PI / 2);
    ctx.fillRect(-2, -10, 4, 20);
    ctx.restore();
  }
  ctx.restore();
}

function drawZombie(z) {
  if (!z.alive) return;
  const { x, y, hue, seed } = z;
  const r = ZOMBIE_R;
  const angry  = Math.hypot(ship.x - z.x, ship.y - z.y) < Z_AGGRO_DIST;
  const killed = (killerZombieIdx >= 0 && z === zombies[killerZombieIdx]);

  ctx.save();
  ctx.translate(x, y);

  ctx.shadowColor = angry ? 'rgba(180,0,0,0.6)' : `hsl(${hue},50%,22%)`;
  ctx.shadowBlur  = 10;

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle   = angry ? 'hsl(0,70%,22%)' : `hsl(${hue},52%,28%)`;
  ctx.fill();
  ctx.strokeStyle = angry ? 'hsl(0,60%,14%)' : `hsl(${hue},40%,18%)`;
  ctx.lineWidth   = 2.5;
  ctx.stroke();
  ctx.shadowBlur  = 0;

  // Eyes
  const eyeX = r * 0.3, eyeY = -r * 0.18;
  const eyeW = r * 0.32, eyeH = r * 0.26;
  [[-eyeX, eyeY], [eyeX, eyeY]].forEach(([ex, ey]) => {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(ex - eyeW / 2, ey - eyeH / 2, eyeW, eyeH);
    ctx.fillStyle = '#bb0000';
    ctx.fillRect(ex - eyeW * 0.18, ey - eyeH * 0.38, eyeW * 0.36, eyeH * 0.76);
  });

  // Angry eyebrows
  if (angry) {
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.moveTo(-eyeX - eyeW * 0.5, eyeY - eyeH * 1.2);
    ctx.lineTo(-eyeX + eyeW * 0.4, eyeY - eyeH * 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeX - eyeW * 0.4, eyeY - eyeH * 0.4);
    ctx.lineTo(eyeX + eyeW * 0.5, eyeY - eyeH * 1.2);
    ctx.stroke();
  }

  // Mouth
  const mY = r * 0.33, mW = r * 0.62, mH = r * 0.22;
  const tW = mW / 4;
  if (killed) {
    // Victory grin
    ctx.fillStyle = '#550000';
    ctx.beginPath();
    ctx.arc(0, mY + mH * 0.5, mW * 0.5, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#f0f0f0';
    for (let i = 0; i < 6; i++) {
      const tx = -mW * 0.5 + i * (mW / 6) + 2;
      ctx.fillRect(tx, mY, mW / 6 - 2, mH * 0.8);
    }
  } else if (angry) {
    ctx.fillStyle = '#880000';
    ctx.fillRect(-mW / 2, mY, mW, mH);
    ctx.fillStyle = '#e8e8e8';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-mW / 2 + i * tW + 1, mY + 1, tW - 2, mH - 2);
    }
  } else {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(-mW / 2, mY, mW, mH);
    ctx.fillStyle = '#c8c8c8';
    for (let i = 0; i < 4; i++) {
      if (i % 2 === 0) {
        ctx.fillRect(-mW / 2 + i * tW + 1, mY + 1, tW - 2, mH - 3);
      }
    }
  }

  // Scar
  if (seed > 0.5) {
    ctx.beginPath();
    ctx.moveTo(-r * 0.12, -r * 0.55);
    ctx.lineTo( r * 0.05, -r * 0.15);
    ctx.strokeStyle = '#8b0000';
    ctx.lineWidth   = 1.8;
    ctx.stroke();
  }

  ctx.restore();
}

function drawZombies() {
  for (const z of zombies) drawZombie(z);
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const { x, y, radius: r } = boss;
  ctx.save();
  ctx.translate(x, y);

  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur  = 20;

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle   = '#5a0a0a';
  ctx.fill();
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth   = 4;
  ctx.stroke();
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#cc0000';
  [[-r * 0.4, -r], [r * 0.4, -r]].forEach(([hx, hy]) => {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx - r * 0.15, hy + r * 0.35);
    ctx.lineTo(hx + r * 0.15, hy + r * 0.35);
    ctx.closePath();
    ctx.fill();
  });

  const eyeX = r * 0.32, eyeY = -r * 0.18, eyeW = r * 0.28, eyeH = r * 0.22;
  [[-eyeX, eyeY], [eyeX, eyeY]].forEach(([ex, ey]) => {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(ex - eyeW / 2, ey - eyeH / 2, eyeW, eyeH);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(ex - eyeW * 0.18, ey - eyeH * 0.38, eyeW * 0.36, eyeH * 0.76);
  });

  const mY = r * 0.33, mW = r * 0.65, mH = r * 0.22;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-mW / 2, mY, mW, mH);
  ctx.fillStyle = '#eee';
  const bTW = mW / 4;
  for (let i = 0; i < 4; i++) {
    if (i % 2 === 0) ctx.fillRect(-mW / 2 + i * bTW + 1, mY + 1, bTW - 2, mH - 3);
  }

  ctx.restore();
}

function drawJoystick() {
  if (!isTouchDevice || (gameState !== 'playing' && gameState !== 'shipDying')) return;
  const jb = joystickBase();
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 3;
  ctx.beginPath(); ctx.arc(jb.x, jb.y, JOY_OUTER_R, 0, Math.PI * 2); ctx.stroke();
  const tx = jb.x + (joystick.active ? joystick.dx : 0);
  const ty = jb.y + (joystick.active ? joystick.dy : 0);
  ctx.fillStyle = '#aaaaff';
  ctx.beginPath(); ctx.arc(tx, ty, JOY_INNER_R, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFireButton() {
  if (!isTouchDevice) return;
  if (gameState === 'title' || gameState === 'gameover' || gameState === 'waveIntro') return;
  const { x, y } = fireBtnPos();
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, FIRE_BTN_R, 0, Math.PI * 2);
  ctx.fillStyle = touchFiring ? 'rgba(255,100,200,0.55)' : 'rgba(255,100,200,0.25)';
  ctx.fill();
  ctx.strokeStyle = touchFiring ? 'rgba(255,100,200,0.9)' : 'rgba(255,100,200,0.5)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.font = 'bold 26px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FIRE', x, y);
  ctx.restore();
}

function drawBossHealthBar() {
  if (!boss || !boss.alive) return;
  const barW = Math.min(400, canvas.width * 0.45);
  const barH = 22;
  const cx   = canvas.width / 2;
  const y    = 78;
  const pct  = boss.hp / boss.maxHp;

  ctx.fillStyle = '#333';
  ctx.fillRect(cx - barW / 2, y, barW, barH);
  ctx.fillStyle = pct > 0.5 ? '#ff4400' : '#ff0000';
  ctx.fillRect(cx - barW / 2, y, barW * pct, barH);
  ctx.strokeStyle = '#ff6666';
  ctx.lineWidth   = 2;
  ctx.strokeRect(cx - barW / 2, y, barW, barH);
  ctx.fillStyle   = '#fff';
  ctx.font        = 'bold 14px monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(`BOSS  ${boss.hp} / ${boss.maxHp}`, cx, y + 15);
}

function drawHUD() {
  const pad = 22;

  ctx.font      = 'bold 22px monospace';
  ctx.fillStyle = '#ffffff';

  ctx.textAlign = 'left';
  ctx.fillText(`WAVE  ${wave}`, pad, 40);

  ctx.textAlign = 'right';
  ctx.fillText(`SCORE  ${score}`, canvas.width - pad, 40);

  ctx.textAlign = 'center';
  ctx.font      = '16px monospace';
  ctx.fillStyle = '#999';
  const alive = zombies.filter(z => z.alive).length;
  const total = zombies.length;
  ctx.fillText(`Zombies  ${alive} / ${total}`, canvas.width / 2, 40);

  // Respawn warning
  const pending = zombies.filter(z => !z.alive && z.respawnTimer > 0);
  if (pending.length > 0) {
    const minT = Math.min(...pending.map(z => z.respawnTimer));
    ctx.fillStyle = minT < 2 ? '#ff3300' : '#ff8800';
    ctx.font      = '15px monospace';
    const label = pending.length === 1 ? '1 zombie' : `${pending.length} zombies`;
    ctx.fillText(`! ${label} respawn in ${minT.toFixed(1)}s`, canvas.width / 2, 64);
  }

  // Lives display
  ctx.textAlign = 'left';
  ctx.font      = 'bold 18px monospace';
  ctx.fillStyle = '#00ff88';
  const livesStr = '♦'.repeat(Math.max(0, ship.lives)) + '◇'.repeat(Math.max(0, LIVES - ship.lives));
  ctx.fillText(livesStr, pad, 68);
}

function drawWaveIntro() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.textAlign = 'center';
  if (isBossWave(wave)) {
    ctx.font        = 'bold 72px monospace';
    ctx.fillStyle   = '#ff2222';
    ctx.shadowColor = '#ff2222';
    ctx.shadowBlur  = 28;
    ctx.fillText('BOSS WAVE!', cx, cy);
    ctx.shadowBlur  = 0;
    ctx.font        = '26px monospace';
    ctx.fillStyle   = '#ff9999';
    ctx.fillText(`Wave ${wave}  ·  Prepare yourself`, cx, cy + 54);
  } else {
    ctx.font        = 'bold 76px monospace';
    ctx.fillStyle   = '#00e87c';
    ctx.shadowColor = '#00e87c';
    ctx.shadowBlur  = 24;
    ctx.fillText(`WAVE  ${wave}`, cx, cy);
    ctx.shadowBlur  = 0;
    ctx.font        = '26px monospace';
    ctx.fillStyle   = '#aaa';
    ctx.fillText('Get ready!', cx, cy + 54);
  }
  ctx.restore();
}

function drawTitle() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.save();
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 56px monospace';
  ctx.fillStyle   = '#00e87c';
  ctx.shadowColor = '#00e87c';
  ctx.shadowBlur  = 20;
  ctx.fillText('ZOMBIE', cx, cy - 60);
  ctx.fillText('SPACE SHOOTER', cx, cy);
  ctx.shadowBlur  = 0;
  ctx.font        = '20px monospace';
  ctx.fillStyle   = '#888';
  ctx.fillText(isTouchDevice
    ? 'Joystick to move  ·  FIRE button to shoot'
    : 'Arrow keys to move  ·  Space to fire', cx, cy + 52);
  ctx.fillStyle   = '#ccc';
  ctx.font        = 'bold 20px monospace';
  ctx.fillText(isTouchDevice ? 'Tap to start' : 'Press SPACE to start', cx, cy + 90);
  ctx.restore();
}

function drawGameOver() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 72px monospace';
  ctx.fillStyle   = '#ff2020';
  ctx.shadowColor = '#ff2020';
  ctx.shadowBlur  = 24;
  ctx.fillText('GAME OVER', cx, cy - 24);
  ctx.shadowBlur  = 0;
  ctx.font        = '28px monospace';
  ctx.fillStyle   = '#fff';
  ctx.fillText(`Wave ${wave}  ·  Score ${score}`, cx, cy + 36);
  ctx.font        = '20px monospace';
  ctx.fillStyle   = '#777';
  ctx.fillText(isTouchDevice ? 'Tap to play again' : 'Press SPACE to play again', cx, cy + 80);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let prevTime = null;

function loop(ts) {
  if (prevTime === null) prevTime = ts;
  const dt = Math.min((ts - prevTime) / 1000, 0.05);
  prevTime = ts;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
