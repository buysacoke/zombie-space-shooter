<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zombie Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Resize ──────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); generateStars(); });

// ── Stars ────────────────────────────────────────────────────────────────────
let stars = [];
function generateStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.2,
      a: Math.random() * 0.6 + 0.25,
    });
  }
}
generateStars();

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
    e.preventDefault();
  }
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx     = null;
let musicNodes   = null;   // holds running music oscillator refs
let currentMusic = 'none'; // 'none' | 'normal' | 'boss'
let activeGroans = 0;      // cap concurrent zombie groan sounds

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playLaser() {
  if (!audioCtx) return;
  const t   = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.exponentialRampToValueAtTime(110, t + 0.1);
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.14);
}

function playGroan(isBoss) {
  if (!audioCtx) return;
  if (!isBoss && activeGroans >= 3) return;
  activeGroans++;

  const t        = audioCtx.currentTime;
  const baseFreq = isBoss ? 52 : 85 + Math.random() * 45;
  const vol      = isBoss ? 0.13 : 0.055;
  const dur      = isBoss ? 0.65 : 0.42;

  const osc    = audioCtx.createOscillator();
  const shaper = audioCtx.createWaveShaper();
  const g      = audioCtx.createGain();

  // Soft distortion curve
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (Math.PI + 150) * x / (Math.PI + 150 * Math.abs(x));
  }
  shaper.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.65, t + dur);

  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.06);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.linearRampToValueAtTime(0.001, t + dur);

  osc.connect(shaper);
  shaper.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.05);
  osc.onended = () => { activeGroans = Math.max(0, activeGroans - 1); };
}

function stopMusic() {
  if (!musicNodes || !audioCtx) return;
  const t = audioCtx.currentTime;
  musicNodes.masterGain.gain.setValueAtTime(musicNodes.masterGain.gain.value, t);
  musicNodes.masterGain.gain.linearRampToValueAtTime(0, t + 0.6);
  const nodes = musicNodes.oscillators;
  setTimeout(() => {
    nodes.forEach(n => { try { n.stop(); n.disconnect(); } catch(e) {} });
  }, 700);
  musicNodes   = null;
  currentMusic = 'none';
}

function startMusic(type) {
  if (currentMusic === type) return;
  stopMusic();
  if (!audioCtx) return;
  currentMusic = type;

  const masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);
  const oscillators = [];

  if (type === 'normal') {
    // Ambient space: three sine layers + slow tremolo LFO
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.045, audioCtx.currentTime + 1.0);

    const freqs = [110, 165, 220];
    freqs.forEach(f => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.connect(masterGain);
      osc.start();
      oscillators.push(osc);
    });

    // Slow tremolo LFO at 0.25 Hz
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.25;
    lfoGain.gain.value  = 0.018;
    lfo.connect(lfoGain);
    lfoGain.connect(masterGain.gain);
    lfo.start();
    oscillators.push(lfo);

  } else if (type === 'boss') {
    // Ominous: low sawtooth drone + minor-third + rhythmic pulse LFO
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.055, audioCtx.currentTime + 0.8);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.connect(masterGain);

    [[55, 'sawtooth'], [82.5, 'square']].forEach(([f, t]) => {
      const osc = audioCtx.createOscillator();
      osc.type = t;
      osc.frequency.value = f;
      osc.connect(filter);
      osc.start();
      oscillators.push(osc);
    });

    // Rhythmic pulse LFO at 1.8 Hz
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 1.8;
    lfoGain.gain.value  = 0.025;
    lfo.connect(lfoGain);
    lfoGain.connect(masterGain.gain);
    lfo.start();
    oscillators.push(lfo);
  }

  musicNodes = { masterGain, oscillators };
}

// ── Constants ────────────────────────────────────────────────────────────────
const SHIP_SPEED     = 240;   // px/s
const SHIP_W         = 22;    // half-width of ship triangle
const SHIP_H         = 36;    // full height of ship triangle
const SHIP_HIT_R     = 14;    // ship collision radius

const LASER_SPEED    = 760;   // px/s upward
const LASER_W        = 3;     // px
const LASER_H        = 20;    // px
const LASER_GAP      = 10;    // px from ship center x
const FIRE_RATE      = 0.15;  // seconds between bursts

const ZOMBIE_R       = 20;    // zombie collision radius
const Z_SPEED_NORM   = 55;    // px/s toward player
const Z_SPEED_AGGRO  = 175;   // px/s when player is nearby
const Z_AGGRO_DIST   = 150;   // px — trigger aggro

const BOSS_BASE_HP     = 10;  // boss 1 HP; each successive boss +10
const BOSS_BASE_SPEED  = 42;  // px/s — boss 1 speed
const BOSS_SPEED_SCALE = 18;  // px/s added per boss number
const BOSS_BASE_R      = 65;  // px — boss 1 radius
const BOSS_MAX_R       = 80;  // cap boss radius growth

const WAVE_INTRO_DUR = 2.2;   // seconds for "WAVE N" screen

// ── Game state ───────────────────────────────────────────────────────────────
// States: 'title' | 'waveIntro' | 'playing' | 'gameover'
let gameState = 'title';
let score     = 0;
let wave      = 1;
let stateTimer   = 0;
let lastFireTime = -999;

let ship    = { x: 0, y: 0 };
let lasers  = [];   // { x (center), y (top), dead }
let zombies = [];   // { x, y, alive, respawnTimer, seed, hue }

let boss           = null;  // null when no boss active
let bossesDefeated = 0;     // count of bosses killed this run
let shipSpeedMult  = 1.0;   // multiplied into SHIP_SPEED; +0.1 per boss kill

// ── Init / Reset ─────────────────────────────────────────────────────────────
function resetShipPos() {
  ship.x = canvas.width  / 2;
  ship.y = canvas.height * 0.75;
}

function initGame() {
  ensureAudio();
  stopMusic();
  score          = 0;
  wave           = 1;
  lastFireTime   = -999;
  bossesDefeated = 0;
  shipSpeedMult  = 1.0;
  boss           = null;
  lasers         = [];
  zombies        = [];
  resetShipPos();
  beginWaveIntro();
}

function beginWaveIntro() {
  lasers     = [];
  zombies    = [];
  boss       = null;
  stateTimer = WAVE_INTRO_DUR;
  gameState  = 'waveIntro';
  resetShipPos();
}

function isBossWave(w) { return w % 6 === 0; }
function bossNumber(w) { return w / 6; }

function calcRespawnTime(count) {
  return Math.max(3, 5 + Math.floor((count - 3) / 2));
}

function spawnBoss() {
  const bn = bossNumber(wave);
  boss = {
    x:          canvas.width / 2,
    y:          -BOSS_BASE_R - 10,
    alive:      true,
    hp:         BOSS_BASE_HP * bn,
    maxHp:      BOSS_BASE_HP * bn,
    radius:     Math.min(BOSS_MAX_R, BOSS_BASE_R + (bn - 1) * 5),
    speed:      BOSS_BASE_SPEED + (bn - 1) * BOSS_SPEED_SCALE,
    seed:       Math.random(),
    hue:        0,
    groanTimer: 2 + Math.random() * 3,
  };
}

function spawnWave() {
  if (isBossWave(wave)) {
    spawnBoss();
    startMusic('boss');
  } else {
    const count = 3 + (wave - 1) * 2;
    for (let i = 0; i < count; i++) zombies.push(makeZombie());
    startMusic('normal');
  }
}

function makeZombie() {
  const W = canvas.width, H = canvas.height;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if      (edge === 0) { x = Math.random() * W; y = -ZOMBIE_R - 5; }
  else if (edge === 1) { x = Math.random() * W; y = H + ZOMBIE_R + 5; }
  else if (edge === 2) { x = -ZOMBIE_R - 5;     y = Math.random() * H; }
  else                 { x = W + ZOMBIE_R + 5;  y = Math.random() * H; }
  return {
    x, y,
    alive: true,
    respawnTimer: 0,
    seed: Math.random(),
    hue: 90 + Math.random() * 50,
    groanTimer: 2 + Math.random() * 5,
  };
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  // Title or gameover: press Space to continue
  if (gameState === 'title' || gameState === 'gameover') {
    if (keys['Space']) {
      keys['Space'] = false;
      initGame();
    }
    return;
  }

  // Wave intro countdown
  if (gameState === 'waveIntro') {
    stateTimer -= dt;
    if (stateTimer <= 0) {
      spawnWave();
      gameState = 'playing';
    }
    return;
  }

  // Playing
  updateShip(dt);
  updateLasers(dt);
  updateZombies(dt);
  updateBoss(dt);
  tryFire();
  resolveCollisions();
}

function updateShip(dt) {
  const spd = SHIP_SPEED * shipSpeedMult;
  if (keys['ArrowLeft'])  ship.x -= spd * dt;
  if (keys['ArrowRight']) ship.x += spd * dt;
  if (keys['ArrowUp'])    ship.y -= spd * dt;
  if (keys['ArrowDown'])  ship.y += spd * dt;

  // Clamp within screen
  const hw = SHIP_W + 2, hh = SHIP_H / 2 + 2;
  ship.x = Math.max(hw, Math.min(canvas.width  - hw, ship.x));
  ship.y = Math.max(hh, Math.min(canvas.height - hh, ship.y));
}

function tryFire() {
  if (!keys['Space']) return;
  const now = performance.now() / 1000;
  if (now - lastFireTime < FIRE_RATE) return;
  lastFireTime = now;
  playLaser();
  const tipY = ship.y - SHIP_H / 2;
  // Two parallel lasers from near the ship tip
  lasers.push({ x: ship.x - LASER_GAP, y: tipY - LASER_H, dead: false });
  lasers.push({ x: ship.x + LASER_GAP, y: tipY - LASER_H, dead: false });
}

function updateLasers(dt) {
  for (const l of lasers) l.y -= LASER_SPEED * dt;
  lasers = lasers.filter(l => !l.dead && l.y + LASER_H > 0);
}

function updateZombies(dt) {
  const W = canvas.width, H = canvas.height;

  for (const z of zombies) {
    if (!z.alive) {
      // Countdown to respawn
      z.respawnTimer -= dt;
      if (z.respawnTimer <= 0) {
        const fresh = makeZombie();
        z.x = fresh.x;
        z.y = fresh.y;
        z.alive = true;
      }
      continue;
    }

    // Choose target and speed
    const distToShip = Math.hypot(ship.x - z.x, ship.y - z.y);
    let tx, ty, spd;
    if (distToShip < Z_AGGRO_DIST) {
      tx = ship.x; ty = ship.y; spd = Z_SPEED_AGGRO;
    } else {
      tx = ship.x; ty = ship.y; spd = Z_SPEED_NORM;
    }

    const dx = tx - z.x, dy = ty - z.y;
    const d  = Math.hypot(dx, dy);
    if (d > 0.5) {
      z.x += (dx / d) * spd * dt;
      z.y += (dy / d) * spd * dt;
    }

    // Wrap around screen edges
    const buf = ZOMBIE_R + 5;
    if (z.x < -buf)     z.x += W + buf * 2;
    if (z.x > W + buf)  z.x -= W + buf * 2;
    if (z.y < -buf)     z.y += H + buf * 2;
    if (z.y > H + buf)  z.y -= H + buf * 2;

    z.groanTimer -= dt;
    if (z.groanTimer <= 0) {
      playGroan(false);
      z.groanTimer = 3 + Math.random() * 6;
    }
  }
}

function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  const dx = ship.x - boss.x, dy = ship.y - boss.y;
  const d  = Math.hypot(dx, dy);
  if (d > 0.5) {
    boss.x += (dx / d) * boss.speed * dt;
    boss.y += (dy / d) * boss.speed * dt;
  }

  boss.groanTimer -= dt;
  if (boss.groanTimer <= 0) {
    playGroan(true);
    boss.groanTimer = 3 + Math.random() * 4;
  }
}

function resolveCollisions() {
  // Lasers vs zombies (AABB rect x circle)
  for (const l of lasers) {
    if (l.dead) continue;
    const lLeft = l.x - LASER_W / 2, lRight = l.x + LASER_W / 2;
    const lTop  = l.y,               lBot   = l.y + LASER_H;
    for (const z of zombies) {
      if (!z.alive) continue;
      const nearX = Math.max(lLeft, Math.min(z.x, lRight));
      const nearY = Math.max(lTop,  Math.min(z.y, lBot));
      if ((nearX - z.x) ** 2 + (nearY - z.y) ** 2 < ZOMBIE_R ** 2) {
        z.alive        = false;
        z.respawnTimer = calcRespawnTime(zombies.length);
        score++;
        l.dead = true;
        break;
      }
    }
  }

  // Lasers vs boss
  if (boss && boss.alive) {
    for (const l of lasers) {
      if (l.dead) continue;
      const lLeft = l.x - LASER_W / 2, lRight = l.x + LASER_W / 2;
      const lTop  = l.y,               lBot   = l.y + LASER_H;
      const nearX = Math.max(lLeft, Math.min(boss.x, lRight));
      const nearY = Math.max(lTop,  Math.min(boss.y, lBot));
      if ((nearX - boss.x) ** 2 + (nearY - boss.y) ** 2 < boss.radius ** 2) {
        boss.hp--;
        l.dead = true;
        if (boss.hp <= 0) {
          boss.alive = false;
          bossesDefeated++;
          shipSpeedMult += 0.1;
        }
      }
    }
  }

  // Ship vs zombies
  for (const z of zombies) {
    if (!z.alive) continue;
    if (Math.hypot(ship.x - z.x, ship.y - z.y) < ZOMBIE_R + SHIP_HIT_R) {
      gameState = 'gameover';
      stopMusic();
      return;
    }
  }

  // Ship vs boss
  if (boss && boss.alive) {
    if (Math.hypot(ship.x - boss.x, ship.y - boss.y) < boss.radius + SHIP_HIT_R) {
      gameState = 'gameover';
      stopMusic();
      return;
    }
  }

  // Wave complete: all zombies dead, or boss dead
  const allZombiesDead = zombies.length > 0 && !zombies.some(z => z.alive);
  const bossDead       = boss && !boss.alive;
  if (allZombiesDead || bossDead) {
    wave++;
    beginWaveIntro();
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  if (gameState === 'waveIntro') {
    drawWaveIntro();
    return;
  }

  // playing or gameover — render game world
  drawZombies();
  drawBoss();
  drawLasers();
  drawShip();
  drawHUD();
  drawBossHealthBar();

  if (gameState === 'gameover') {
    drawGameOver();
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  }
}

function drawShip() {
  ctx.save();
  ctx.translate(ship.x, ship.y);

  // Thruster glow when moving
  const moving = keys['ArrowUp'] || keys['ArrowDown'] ||
                 keys['ArrowLeft'] || keys['ArrowRight'];
  if (moving) {
    const grad = ctx.createRadialGradient(0, SHIP_H * 0.35, 0, 0, SHIP_H * 0.35, 14);
    grad.addColorStop(0, 'rgba(0,180,255,0.55)');
    grad.addColorStop(1, 'rgba(0,180,255,0)');
    ctx.beginPath();
    ctx.arc(0, SHIP_H * 0.35, 14, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Ship triangle (tip points up)
  ctx.beginPath();
  ctx.moveTo(0, -SHIP_H / 2);
  ctx.lineTo( SHIP_W,  SHIP_H / 2);
  ctx.lineTo(-SHIP_W,  SHIP_H / 2);
  ctx.closePath();
  ctx.fillStyle   = '#00e87c';
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Cockpit window
  ctx.beginPath();
  ctx.arc(0, -4, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(160,230,255,0.85)';
  ctx.fill();

  ctx.restore();
}

function drawLasers() {
  ctx.save();
  ctx.shadowColor = '#ff44bb';
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = '#ff66cc';
  for (const l of lasers) {
    if (l.dead) continue;
    ctx.fillRect(l.x - LASER_W / 2, l.y, LASER_W, LASER_H);
  }
  ctx.restore();
}

function drawZombie(z) {
  if (!z.alive) return;
  const { x, y, hue, seed } = z;
  const r = ZOMBIE_R;

  ctx.save();
  ctx.translate(x, y);

  // Body glow
  ctx.shadowColor = `hsl(${hue},50%,22%)`;
  ctx.shadowBlur  = 10;

  // Body circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle   = `hsl(${hue},52%,28%)`;
  ctx.fill();
  ctx.strokeStyle = `hsl(${hue},40%,18%)`;
  ctx.lineWidth   = 2.5;
  ctx.stroke();
  ctx.shadowBlur  = 0;

  // Eyes
  const eyeX = r * 0.3, eyeY = -r * 0.18;
  const eyeW = r * 0.32, eyeH = r * 0.26;
  [[-eyeX, eyeY], [eyeX, eyeY]].forEach(([ex, ey]) => {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(ex - eyeW / 2, ey - eyeH / 2, eyeW, eyeH);
    ctx.fillStyle = '#bb0000';
    ctx.fillRect(ex - eyeW * 0.18, ey - eyeH * 0.38, eyeW * 0.36, eyeH * 0.76);
  });

  // Mouth background
  const mY = r * 0.33, mW = r * 0.62, mH = r * 0.22;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-mW / 2, mY, mW, mH);
  // Blocky teeth (every other slot)
  ctx.fillStyle = '#c8c8c8';
  const tW = mW / 4;
  for (let i = 0; i < 4; i++) {
    if (i % 2 === 0) {
      ctx.fillRect(-mW / 2 + i * tW + 1, mY + 1, tW - 2, mH - 3);
    }
  }

  // Scar (half of zombies, based on seed)
  if (seed > 0.5) {
    ctx.beginPath();
    ctx.moveTo(-r * 0.12, -r * 0.55);
    ctx.lineTo( r * 0.05, -r * 0.15);
    ctx.strokeStyle = '#8b0000';
    ctx.lineWidth   = 1.8;
    ctx.stroke();
  }

  ctx.restore();
}

function drawZombies() {
  for (const z of zombies) drawZombie(z);
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const { x, y, radius: r } = boss;
  ctx.save();
  ctx.translate(x, y);

  // Glow
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur  = 20;

  // Body
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle   = '#5a0a0a';
  ctx.fill();
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth   = 4;
  ctx.stroke();
  ctx.shadowBlur  = 0;

  // Horns
  ctx.fillStyle = '#cc0000';
  [[-r * 0.4, -r], [r * 0.4, -r]].forEach(([hx, hy]) => {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx - r * 0.15, hy + r * 0.35);
    ctx.lineTo(hx + r * 0.15, hy + r * 0.35);
    ctx.closePath();
    ctx.fill();
  });

  // Eyes
  const eyeX = r * 0.32, eyeY = -r * 0.18, eyeW = r * 0.28, eyeH = r * 0.22;
  [[-eyeX, eyeY], [eyeX, eyeY]].forEach(([ex, ey]) => {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(ex - eyeW / 2, ey - eyeH / 2, eyeW, eyeH);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(ex - eyeW * 0.18, ey - eyeH * 0.38, eyeW * 0.36, eyeH * 0.76);
  });

  // Mouth
  const mY = r * 0.33, mW = r * 0.65, mH = r * 0.22;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-mW / 2, mY, mW, mH);
  ctx.fillStyle = '#eee';
  const tW = mW / 4;
  for (let i = 0; i < 4; i++) {
    if (i % 2 === 0) ctx.fillRect(-mW / 2 + i * tW + 1, mY + 1, tW - 2, mH - 3);
  }

  ctx.restore();
}

function drawBossHealthBar() {
  if (!boss || !boss.alive) return;
  const barW = Math.min(400, canvas.width * 0.45);
  const barH = 22;
  const cx   = canvas.width / 2;
  const y    = 78;
  const pct  = boss.hp / boss.maxHp;

  ctx.fillStyle = '#333';
  ctx.fillRect(cx - barW / 2, y, barW, barH);
  ctx.fillStyle = pct > 0.5 ? '#ff4400' : '#ff0000';
  ctx.fillRect(cx - barW / 2, y, barW * pct, barH);
  ctx.strokeStyle = '#ff6666';
  ctx.lineWidth   = 2;
  ctx.strokeRect(cx - barW / 2, y, barW, barH);
  ctx.fillStyle   = '#fff';
  ctx.font        = 'bold 14px monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(`BOSS  ${boss.hp} / ${boss.maxHp}`, cx, y + 15);
}

function drawHUD() {
  const pad = 22;

  ctx.font      = 'bold 22px monospace';
  ctx.fillStyle = '#ffffff';

  ctx.textAlign = 'left';
  ctx.fillText(`WAVE  ${wave}`, pad, 40);

  ctx.textAlign = 'right';
  ctx.fillText(`SCORE  ${score}`, canvas.width - pad, 40);

  // Zombie counter
  const alive = zombies.filter(z => z.alive).length;
  const total = zombies.length;
  ctx.textAlign = 'center';
  ctx.font      = '16px monospace';
  ctx.fillStyle = '#999';
  ctx.fillText(`Zombies  ${alive} / ${total}`, canvas.width / 2, 40);

  // Respawn warning
  const pending = zombies.filter(z => !z.alive && z.respawnTimer > 0);
  if (pending.length > 0) {
    const minT = Math.min(...pending.map(z => z.respawnTimer));
    ctx.fillStyle = minT < 2 ? '#ff3300' : '#ff8800';
    ctx.font      = '15px monospace';
    const label = pending.length === 1 ? '1 zombie' : `${pending.length} zombies`;
    ctx.fillText(`! ${label} respawn in ${minT.toFixed(1)}s`, canvas.width / 2, 64);
  }
}

function drawWaveIntro() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.textAlign = 'center';
  if (isBossWave(wave)) {
    ctx.font        = 'bold 72px monospace';
    ctx.fillStyle   = '#ff2222';
    ctx.shadowColor = '#ff2222';
    ctx.shadowBlur  = 28;
    ctx.fillText('BOSS WAVE!', cx, cy);
    ctx.shadowBlur  = 0;
    ctx.font        = '26px monospace';
    ctx.fillStyle   = '#ff9999';
    ctx.fillText(`Wave ${wave}  ·  Prepare yourself`, cx, cy + 54);
  } else {
    ctx.font        = 'bold 76px monospace';
    ctx.fillStyle   = '#00e87c';
    ctx.shadowColor = '#00e87c';
    ctx.shadowBlur  = 24;
    ctx.fillText(`WAVE  ${wave}`, cx, cy);
    ctx.shadowBlur  = 0;
    ctx.font        = '26px monospace';
    ctx.fillStyle   = '#aaa';
    ctx.fillText('Get ready!', cx, cy + 54);
  }
  ctx.restore();
}

function drawTitle() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.save();
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 56px monospace';
  ctx.fillStyle   = '#00e87c';
  ctx.shadowColor = '#00e87c';
  ctx.shadowBlur  = 20;
  ctx.fillText('ZOMBIE', cx, cy - 60);
  ctx.fillText('SPACE SHOOTER', cx, cy);
  ctx.shadowBlur  = 0;
  ctx.font        = '20px monospace';
  ctx.fillStyle   = '#888';
  ctx.fillText('Arrow keys to move  ·  Space to fire', cx, cy + 52);
  ctx.fillStyle   = '#ccc';
  ctx.font        = 'bold 20px monospace';
  ctx.fillText('Press SPACE to start', cx, cy + 90);
  ctx.restore();
}

function drawGameOver() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 72px monospace';
  ctx.fillStyle   = '#ff2020';
  ctx.shadowColor = '#ff2020';
  ctx.shadowBlur  = 24;
  ctx.fillText('GAME OVER', cx, cy - 24);
  ctx.shadowBlur  = 0;
  ctx.font        = '28px monospace';
  ctx.fillStyle   = '#fff';
  ctx.fillText(`Wave ${wave}  ·  Score ${score}`, cx, cy + 36);
  ctx.font        = '20px monospace';
  ctx.fillStyle   = '#777';
  ctx.fillText('Press SPACE to play again', cx, cy + 80);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let prevTime = null;

function loop(ts) {
  if (prevTime === null) prevTime = ts;
  const dt = Math.min((ts - prevTime) / 1000, 0.05); // cap at 50ms
  prevTime = ts;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
